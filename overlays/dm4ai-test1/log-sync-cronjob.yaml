apiVersion: batch/v1
kind: CronJob
metadata:
  name: dspace-log-backup
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: dspace-log-s3-sync
              env:
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_ENDPOINT
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-secret
                      key: S3_REGION
                - name: S3_BUCKET_NAME
                  value: cuni-repo-dm4ai-test1-log-001
              envFrom:
                - secretRef:
                    name: s3-backup-secret
