apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../k8s
  - backup-sealed-secrets.yaml

namespace: cuni-repo-dm4ai-test1   # <-- change to whatever you need

# -------------------------------------------------------------------------
# 3️⃣  Patches that change the public hostname and S3 backup configuration
# -------------------------------------------------------------------------
patches:
  - path: sealed-secrets.yaml
  - path: angular-deployment.yaml
    target:
      kind: Deployment
      name: dspace-angular
  # DSpace backend can read any property from the env
  # but if this is getting too large consider overlaying local.cfg
  - path: backend-deployment.yaml
    target:
      kind: Deployment
      name: dspace-backend
  # PostgreSQL backup configuration - customize S3 endpoint and bucket
  - path: postgres-cnpg-backup-plugin-config.yaml
    target:
      kind: ObjectStore
      name: dspace-barman-store
  - target:
      kind: Ingress
      name: dspace-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: "test.dm4ai.du.cesnet.cz"
      - op: replace
        path: /spec/tls/0/secretName
        value: "test-dm4ai-du-cesnet-cz-tls" #replace . with - and append -tls
      - op: replace
        path: /spec/rules/0/host
        value: "test.dm4ai.du.cesnet.cz"
  - path: log-sync-cronjob.yaml
  # storageClass update for NRP cluster
  - target:
      kind: PersistentVolumeClaim
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: "csi-cephfs-nrp-sc"
  - target:
      kind: Cluster
      name: dspace-postgres
    patch: |-
      - op: replace
        path: /spec/storage/storageClass
        value: "csi-rbd-nrp-ssd-sc"
      - op: replace
        path: /spec/walStorage/storageClass
        value: "csi-rbd-nrp-ssd-sc"
  - target:
      kind: PersistentVolumeClaim
      name: solr-data-pvc
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: "csi-rbd-nrp-ssd-sc"

images:
  - name: dataquest/dspace
    newName: ufal/dspace
    newTag: 2026.1-rc2
  - name: dataquest/dspace-solr
    newName: ufal/dspace-solr
    newTag: 2026.1-rc2
  - name: dataquest/dspace-angular
    newName: ufal/dspace-angular
    newTag: 2026.1-rc3
