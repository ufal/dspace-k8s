apiVersion: apps/v1
kind: Deployment
metadata:
  name: dspace-backend
spec:
  template:
    spec:
      containers:
        - name: dspace
          env:
            - name: dspace__P__hostname
              value: "dspace.localhost"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
